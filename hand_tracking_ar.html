<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Hand Tracking AR — MediaPipe</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#0a0a0f;overflow:hidden;
    font-family:'Courier New',monospace;}

  #container{position:relative;width:100%;height:100%;display:flex;
    align-items:center;justify-content:center;}

  video{position:absolute;width:100%;height:100%;object-fit:cover;
    transform:scaleX(-1);opacity:0;}

  canvas#output{position:absolute;width:100%;height:100%;
    image-rendering:pixelated;}

  #hud{position:fixed;top:0;left:0;width:100%;height:100%;
    pointer-events:none;z-index:10;}

  #topbar{position:fixed;top:0;left:0;right:0;padding:14px 20px;
    display:flex;justify-content:space-between;align-items:center;
    background:linear-gradient(to bottom,rgba(0,0,10,0.85),transparent);
    z-index:20;}

  .brand{font-size:11px;letter-spacing:0.25em;color:rgba(0,255,180,0.8);
    text-transform:uppercase;}
  .brand span{color:rgba(255,255,255,0.35);}

  #status{font-size:10px;letter-spacing:0.18em;padding:5px 12px;
    border:1px solid rgba(0,255,180,0.3);border-radius:3px;
    color:rgba(0,255,180,0.7);background:rgba(0,255,180,0.05);}

  #bottombar{position:fixed;bottom:0;left:0;right:0;padding:14px 20px;
    display:flex;justify-content:space-between;align-items:flex-end;
    background:linear-gradient(to top,rgba(0,0,10,0.8),transparent);
    z-index:20;}

  #stats{display:flex;gap:20px;}
  .stat{display:flex;flex-direction:column;gap:2px;}
  .stat-label{font-size:8px;letter-spacing:0.2em;color:rgba(255,255,255,0.3);}
  .stat-val{font-size:14px;font-weight:700;color:rgba(0,255,200,0.9);
    font-family:'Courier New',monospace;}

  #handcount{font-size:9px;letter-spacing:0.15em;color:rgba(255,255,255,0.25);}

  #loading{position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;background:#0a0a0f;z-index:50;
    gap:18px;transition:opacity 0.8s;}
  #loading.fade{opacity:0;pointer-events:none;}

  .load-title{font-size:13px;letter-spacing:0.3em;color:rgba(0,255,180,0.8);}
  .load-sub{font-size:9px;letter-spacing:0.2em;color:rgba(255,255,255,0.3);}

  .progress-bar{width:220px;height:2px;background:rgba(255,255,255,0.08);
    border-radius:2px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,#00ffb4,#00aaff);
    width:0%;transition:width 0.4s;border-radius:2px;}

  #corner-tl,#corner-tr,#corner-bl,#corner-br{
    position:fixed;width:22px;height:22px;z-index:15;pointer-events:none;}
  #corner-tl{top:8px;left:8px;
    border-top:1.5px solid rgba(0,255,180,0.4);
    border-left:1.5px solid rgba(0,255,180,0.4);}
  #corner-tr{top:8px;right:8px;
    border-top:1.5px solid rgba(0,255,180,0.4);
    border-right:1.5px solid rgba(0,255,180,0.4);}
  #corner-bl{bottom:8px;left:8px;
    border-bottom:1.5px solid rgba(0,255,180,0.4);
    border-left:1.5px solid rgba(0,255,180,0.4);}
  #corner-br{bottom:8px;right:8px;
    border-bottom:1.5px solid rgba(0,255,180,0.4);
    border-right:1.5px solid rgba(0,255,180,0.4);}

  #nocam{position:fixed;inset:0;display:none;align-items:center;
    justify-content:center;background:#0a0a0f;z-index:60;flex-direction:column;gap:14px;}
  #nocam.show{display:flex;}
  .nocam-title{font-size:13px;letter-spacing:0.2em;color:rgba(255,80,80,0.85);}
  .nocam-sub{font-size:9px;letter-spacing:0.15em;color:rgba(255,255,255,0.3);
    text-align:center;max-width:300px;line-height:1.8;}
</style>
</head>
<body>

<div id="nocam">
  <div class="nocam-title">CAMERA ACCESS DENIED</div>
  <div class="nocam-sub">Please allow camera access in your browser and reload the page to use hand tracking.</div>
</div>

<div id="loading">
  <div class="load-title">HAND TRACKING AR</div>
  <div class="load-sub" id="load-msg">LOADING MEDIAPIPE MODEL…</div>
  <div class="progress-bar"><div class="progress-fill" id="progress"></div></div>
</div>

<div id="container">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="output"></canvas>
</div>

<div id="corner-tl"></div>
<div id="corner-tr"></div>
<div id="corner-bl"></div>
<div id="corner-br"></div>

<div id="topbar">
  <div class="brand">HAND<span>TRACK</span> AR <span>// MEDIAPIPE</span></div>
  <div id="status">INITIALIZING</div>
</div>

<div id="bottombar">
  <div id="stats">
    <div class="stat">
      <span class="stat-label">HANDS</span>
      <span class="stat-val" id="val-hands">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">LANDMARKS</span>
      <span class="stat-val" id="val-lm">0</span>
    </div>
    <div class="stat">
      <span class="stat-label">FPS</span>
      <span class="stat-val" id="val-fps">--</span>
    </div>
  </div>
  <div id="handcount">21 LANDMARK POINTS PER HAND</div>
</div>

<!-- MediaPipe CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

<script>
const videoEl   = document.getElementById('video');
const canvas    = document.getElementById('output');
const ctx       = canvas.getContext('2d');
const loadEl    = document.getElementById('loading');
const statusEl  = document.getElementById('status');
const progEl    = document.getElementById('progress');
const loadMsg   = document.getElementById('load-msg');
const valHands  = document.getElementById('val-hands');
const valLm     = document.getElementById('val-lm');
const valFps    = document.getElementById('val-fps');

// resize canvas
function resize(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// FPS tracking
let fpsArr = [], lastT = performance.now();

// ── Landmark connections for hand skeleton ───────────────────────────────────
// MediaPipe 21 keypoints: 0=wrist, 1-4=thumb, 5-8=index, 9-12=middle,
// 13-16=ring, 17-20=pinky
const CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],         // thumb
  [0,5],[5,6],[6,7],[7,8],         // index
  [0,9],[9,10],[10,11],[11,12],    // middle
  [0,13],[13,14],[14,15],[15,16],  // ring
  [0,17],[17,18],[18,19],[19,20],  // pinky
  [5,9],[9,13],[13,17],            // palm cross
];

// Finger colors (red/green like screenshot)
const FINGER_COLORS = [
  '#ff4466', // thumb
  '#44ff88', // index
  '#44aaff', // middle
  '#ffaa00', // ring
  '#ff44ff', // pinky
  '#ffffff',  // palm
];

function fingerColor(idx){
  if(idx<=4)  return FINGER_COLORS[0];
  if(idx<=8)  return FINGER_COLORS[1];
  if(idx<=12) return FINGER_COLORS[2];
  if(idx<=16) return FINGER_COLORS[3];
  if(idx<=20) return FINGER_COLORS[4];
  return FINGER_COLORS[5];
}

// ── Draw one hand ─────────────────────────────────────────────────────────────
function drawHand(landmarks, W, H, handedness, t){
  // map normalized [0,1] → canvas pixels, mirrored
  const pts = landmarks.map(lm=>({
    x: (1 - lm.x) * W,
    y: lm.y * H,
    z: lm.z,
  }));

  // ── glow mesh lines ─────────────────────────────────────────────────────
  CONNECTIONS.forEach(([a,b])=>{
    const pa = pts[a], pb = pts[b];
    const col = fingerColor(Math.max(a,b));

    // outer glow
    ctx.save();
    ctx.globalAlpha = 0.18;
    ctx.strokeStyle = col;
    ctx.lineWidth = 10;
    ctx.shadowColor = col;
    ctx.shadowBlur = 18;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
    ctx.stroke();
    ctx.restore();

    // sharp inner line
    ctx.save();
    ctx.globalAlpha = 0.7;
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.5;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(pa.x, pa.y);
    ctx.lineTo(pb.x, pb.y);
    ctx.stroke();
    ctx.restore();
  });

  // ── landmark dots ───────────────────────────────────────────────────────
  pts.forEach((p, i)=>{
    const col = fingerColor(i);
    const isTip = [4,8,12,16,20].includes(i);
    const r = isTip ? 6 : (i===0 ? 7 : 4);

    // outer glow ring
    ctx.save();
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = col;
    ctx.shadowColor = col;
    ctx.shadowBlur = 20;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r*2.5, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // dot
    ctx.save();
    ctx.fillStyle = col;
    ctx.shadowColor = col;
    ctx.shadowBlur = 10;
    ctx.globalAlpha = 1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();

    // white center for tips
    if(isTip){
      ctx.save();
      ctx.fillStyle = '#ffffff';
      ctx.globalAlpha = 0.9;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  });

  // ── AR mesh distortion effect (colorful overlay like screenshot) ─────────
  // Draw semi-transparent colored "pixel blocks" following the hand mesh
  ctx.save();
  ctx.globalAlpha = 0.08;
  const colors = ['#ff3366','#33ff99','#3366ff','#ffaa00','#ff00ff','#00ffff'];
  CONNECTIONS.forEach(([a,b],ci)=>{
    const pa = pts[a], pb = pts[b];
    const mid = { x:(pa.x+pb.x)/2, y:(pa.y+pb.y)/2 };
    const len = Math.hypot(pb.x-pa.x, pb.y-pa.y);
    // small shimmer rects along the bone
    for(let s=0;s<3;s++){
      const ff = (s+1)/4;
      const px = pa.x + (pb.x-pa.x)*ff + Math.sin(t*3+ci+s)*4;
      const py = pa.y + (pb.y-pa.y)*ff + Math.cos(t*2+ci+s)*4;
      const sz = 8 + Math.abs(Math.sin(t*1.5+ci*0.7+s))*12;
      ctx.fillStyle = colors[(ci+s)%colors.length];
      ctx.fillRect(px-sz/2, py-sz/2, sz, sz);
    }
  });
  ctx.restore();

  // ── Handedness label ────────────────────────────────────────────────────
  const wrist = pts[0];
  ctx.save();
  ctx.font = '10px "Courier New", monospace';
  ctx.letterSpacing = '0.15em';
  ctx.fillStyle = 'rgba(0,255,180,0.7)';
  ctx.shadowColor = 'rgba(0,255,180,0.5)';
  ctx.shadowBlur = 8;
  ctx.fillText(handedness.toUpperCase() + ' HAND', wrist.x - 30, wrist.y + 28);
  ctx.restore();
}

// ── MediaPipe Hands setup ──────────────────────────────────────────────────
let setProgress = v => progEl.style.width = v+'%';

setProgress(10);
loadMsg.textContent = 'REQUESTING CAMERA…';

const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands: 2,
  modelComplexity: 1,
  minDetectionConfidence: 0.65,
  minTrackingConfidence: 0.55,
});

hands.onResults(results => {
  const W = canvas.width, H = canvas.height;
  const t = performance.now() * 0.001;

  // FPS
  const now = performance.now();
  fpsArr.push(1000/(now-lastT));
  lastT=now;
  if(fpsArr.length>20) fpsArr.shift();
  const fps = Math.round(fpsArr.reduce((a,b)=>a+b,0)/fpsArr.length);
  valFps.textContent = fps;

  ctx.clearRect(0,0,W,H);

  // Draw mirrored video feed
  ctx.save();
  ctx.scale(-1,1);
  ctx.translate(-W,0);
  if(results.image){
    ctx.drawImage(results.image, 0, 0, W, H);
  }
  ctx.restore();

  // scan line effect overlay
  ctx.save();
  ctx.globalAlpha = 0.04;
  for(let y=0;y<H;y+=3){
    ctx.fillStyle = '#000010';
    ctx.fillRect(0, y, W, 1);
  }
  ctx.restore();

  // subtle dark overlay to deepen the AR feel
  ctx.save();
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = '#000418';
  ctx.fillRect(0,0,W,H);
  ctx.restore();

  const numHands = results.multiHandLandmarks ? results.multiHandLandmarks.length : 0;
  valHands.textContent = numHands;
  valLm.textContent = numHands * 21;

  if(results.multiHandLandmarks && results.multiHandedness){
    results.multiHandLandmarks.forEach((landmarks, i)=>{
      const side = results.multiHandedness[i]?.label || 'Hand';
      drawHand(landmarks, W, H, side, t);
    });
  }

  statusEl.textContent = numHands > 0
    ? `TRACKING ${numHands} HAND${numHands>1?'S':''}`
    : 'SCANNING…';
});

// ── Start camera ─────────────────────────────────────────────────────────────
async function startCamera(){
  try {
    setProgress(25);
    loadMsg.textContent = 'STARTING CAMERA…';

    const stream = await navigator.mediaDevices.getUserMedia({
      video:{ width:{ideal:1280}, height:{ideal:720}, facingMode:'user' }
    });
    videoEl.srcObject = stream;
    await videoEl.play();

    setProgress(55);
    loadMsg.textContent = 'LOADING AI MODEL…';

    const camera = new Camera(videoEl, {
      onFrame: async () => {
        await hands.send({ image: videoEl });
      },
      width: 1280,
      height: 720,
    });

    setProgress(85);
    loadMsg.textContent = 'CALIBRATING…';

    await camera.start();

    setProgress(100);
    loadMsg.textContent = 'READY';
    statusEl.textContent = 'ACTIVE';

    setTimeout(()=>{
      loadEl.classList.add('fade');
      setTimeout(()=>loadEl.style.display='none', 900);
    }, 600);

  } catch(err){
    console.error(err);
    document.getElementById('nocam').classList.add('show');
    loadEl.style.display='none';
  }
}

startCamera();
</script>
</body>
</html>
